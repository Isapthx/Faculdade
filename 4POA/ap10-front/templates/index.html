<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matriz e Ementas - FAETERJ</title>

<link rel="stylesheet" href="/ap10-front/static/css/index.css">
</head>
<style>
    body {
font-family: Arial, Helvetica, sans-serif;
margin: 0;
background: #f5f5f5;
}

/* Header */

header {
background: #003366;
color: white;
padding: 15px 0;
}

.header-container {
width: 80%;
margin: auto;
display: flex;
justify-content: space-between;
align-items: center;
}

nav a {
color: white;
margin-left: 20px;
text-decoration: none;
}

nav a:hover {
text-decoration: underline;
}

/* Container */

.container {
width: 80%;
margin: 40px auto;
background: white;
padding: 30px;
border-radius: 8px;
}

.descricao {
color: #555;
margin-bottom: 20px;
}

/* Cards */

.opcoes {
display: flex;
gap: 20px;
flex-wrap: wrap;
}

.card {
background: #f1f1f1;
padding: 20px;
flex: 1;
min-width: 200px;
cursor: pointer;
border-left: 5px solid #003366;
transition: 0.3s;
}

.card:hover {
background: #e3e3e3;
}

/* Resultado */

.resultado {
width: 80%;
margin: auto;
background: white;
padding: 30px;
margin-bottom: 40px;
border-radius: 8px;
}

.disciplina {
border-bottom: 1px solid #ddd;
padding: 15px 0;
}

/* Footer */

footer {
background: #003366;
color: white;
text-align: center;
padding: 20px;
}
</style>
<body>

<header>

<div class="header-container">

<h2>FAETERJ - Rio</h2>

<nav>

<a href="#">Início</a>
<a href="#">Matriz</a>
<a href="#">Ementas</a>
<a href="#">Contato</a>
 
</nav>

</div>

</header>

</p>
