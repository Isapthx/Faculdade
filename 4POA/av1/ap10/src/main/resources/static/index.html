<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ementário - FAETERJ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>

<header class="site-header">
    <div class="header-inner">
        <h1 class="header-titulo">Ementário</h1>
        <p class="header-subtitulo">
            Pesquise por disciplina, código, ementa ou bibliografia e encontre rapidamente o
            conteúdo programático integral.
        </p>
        <button class="btn-baixar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Baixar Ementário
        </button>
    </div>
</header>

<main class="site-main">

    <!-- Painel de busca e filtros -->
    <section class="painel-busca">
        <h2 class="painel-titulo">Pesquisar e filtrar</h2>

        <div class="busca-wrapper">
            <svg class="busca-icone" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
                type="text"
                id="input-busca"
                class="busca-input"
                placeholder="Pesquisar por disciplina, código, ementa ou bibliografia..."
            />
        </div>

        <div class="filtros-periodo" id="filtros-periodo">
            <button class="filtro-btn active" data-periodo="todos">Todas</button>
            <button class="filtro-btn" data-periodo="1">1º período</button>
            <button class="filtro-btn" data-periodo="2">2º período</button>
            <button class="filtro-btn" data-periodo="3">3º período</button>
            <button class="filtro-btn" data-periodo="4">4º período</button>
            <button class="filtro-btn" data-periodo="5">5º período</button>
            <button class="filtro-btn" data-periodo="6">6º período</button>
        </div>

        <p class="contagem-resultado" id="contagem-resultado"></p>
    </section>

    <!-- Grid de cards -->
    <section class="secao-cards">
        <div id="container-cards">
            <p class="estado-carregando">Carregando disciplinas...</p>
        </div>
    </section>

</main>

<footer class="site-footer">
    <p>FAETERJ - Faculdade de Educação Tecnológica do Estado do Rio de Janeiro</p>
</footer>

<script type="module" src="/js/pages/home.js"></script>
</body>
</html>
